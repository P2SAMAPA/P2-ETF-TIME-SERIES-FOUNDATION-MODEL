name: TSFM Daily Forecast

on:
  schedule:
    # 21:30 UTC, Mon-Fri (after US market close)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

jobs:
  run-tsfm-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-tsfm-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily TSFM forecast and push results
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python push_results.py
